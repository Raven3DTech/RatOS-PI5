name: Build KlipperPi Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout KlipperPi
        uses: actions/checkout@v4
        with:
          path: KlipperPi

      - name: Checkout CustomPiOS
        uses: actions/checkout@v4
        with:
          repository: guysoft/CustomPiOS
          path: CustomPiOS

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gawk make build-essential util-linux \
            qemu-user-static qemu-system-arm \
            git p7zip-full python3 python3-yaml  python3-git \
            curl unzip wget jq

      - name: Cache base Raspberry Pi OS image
        id: cache-base-image
        uses: actions/cache@v4
        with:
          path: base-image-cache
          key: raspios-lite-arm64-bookworm-v1

      - name: Download base Raspberry Pi OS image
        if: steps.cache-base-image.outputs.cache-hit != 'true'
        run: |
          mkdir -p base-image-cache
          wget -q \
            https://downloads.raspberrypi.org/raspios_lite_arm64_latest \
            -O base-image-cache/raspios_lite_arm64_latest.img.xz
          echo "Downloaded"

      - name: Build image
        run: |
          sudo modprobe loop
          sudo \
            DIST_PATH=$GITHUB_WORKSPACE/KlipperPi/src \
            CUSTOM_PI_OS_PATH=$GITHUB_WORKSPACE/CustomPiOS/src \
            BASE_ZIP_IMG=$GITHUB_WORKSPACE/base-image-cache/raspios_lite_arm64_latest.img.xz \
            bash $GITHUB_WORKSPACE/CustomPiOS/src/build

      - name: Find and rename output image
        id: rename
        run: |
          WORKSPACE=KlipperPi/src/workspace
          VERSION="${{ github.ref_name }}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "main" ]; then
            VERSION=$(date +'%Y%m%d')
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          IMG=$(find "${WORKSPACE}" -maxdepth 1 \( -name "*.img" -o -name "*.img.xz" \) | head -n1)
          if [ -z "${IMG}" ]; then
            echo "No image found" && ls -la "${WORKSPACE}" && exit 1
          fi
          EXT="${IMG##*.img}"
          DEST="${WORKSPACE}/KlipperPi-${VERSION}-arm64.img${EXT}"
          mv "${IMG}" "${DEST}"
          echo "IMAGE_PATH=${DEST}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_NAME=$(basename ${DEST})" >> "$GITHUB_OUTPUT"
          ls -lh "${DEST}"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: KlipperPi-${{ steps.rename.outputs.VERSION }}-arm64
          path: ${{ steps.rename.outputs.IMAGE_PATH }}
          retention-days: 30

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          NOTES=$(awk "/^## ${TAG}/,/^## /" KlipperPi/CHANGELOG.md \
                  | grep -v "^## ${TAG}" | grep -v "^## " | sed '/^$/d')
          if [ -z "${NOTES}" ]; then
            NOTES="See CHANGELOG.md for full details."
          fi
          echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "${NOTES}"   >> "$GITHUB_OUTPUT"
          echo "EOF"        >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.IMAGE_PATH }}
          name: "KlipperPi ${{ github.ref_name }}"
          body: |
            ## KlipperPi ${{ github.ref_name }}

            ${{ steps.changelog.outputs.NOTES }}

            ### Targets
            - Raspberry Pi 5 (Bookworm 64-bit arm64)
            - Raspberry Pi 4 (Bookworm 64-bit arm64)

            ### Flash Instructions
            1. Download the .img.xz file
            2. Open Raspberry Pi Imager, Choose OS, Use Custom
            3. Select file, choose SD card or NVMe, write
            4. Boot Pi, browse to http://klipperpi.local

            ### Default Credentials
            | Service | URL | User | Password |
            |---|---|---|---|
            | SSH | ssh pi@klipperpi.local | pi | raspberry |
            | Mainsail | http://klipperpi.local | - | - |
            | Configurator | http://klipperpi.local:3000 | - | - |

            Change default password after first login: passwd pi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

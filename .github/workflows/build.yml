name: Build RavenOS PI5 Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_pishrink:
        description: "Skip PiShrink (much larger .img.xz; debug if Pi will not boot after shrink)"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout RavenOS PI5
        uses: actions/checkout@v4
        with:
          path: RAVENOS-PI5

      - name: Checkout CustomPiOS
        uses: actions/checkout@v4
        with:
          repository: guysoft/CustomPiOS
          path: CustomPiOS

      - name: Fail fast on CRLF in RavenOS tree
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/RAVENOS-PI5"
          # -I skips binary blobs; CRLF breaks bash source, shebangs, visudo, systemd in chroot.
          bad=$(git grep -l -I $'\r' -- . || true)
          if [ -n "${bad}" ]; then
            echo "::error::CRLF in tracked text — normalize to LF (see .gitattributes). Files:" >&2
            echo "${bad}" >&2
            exit 1
          fi

      # GitHub-hosted runners often have a hostname not listed in /etc/hosts; sudo then prints
      # "unable to resolve host …" on every invocation (harmless but noisy in build logs).
      - name: Map VM hostname in /etc/hosts (quiet sudo warnings)
        run: |
          H=$(hostname)
          grep -qF "$H" /etc/hosts || echo "127.0.0.1 $H" | sudo tee -a /etc/hosts

      # Enlarged Pi images are multi‑GB raw files; PiShrink mounts the image and zero‑fills free
      # space before truncate — needs several GB free on / or the shrink step hits ENOSPC / resize2fs errors.
      - name: Free disk space on runner (PiShrink / large .img)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          sudo docker system prune -af 2>/dev/null || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gawk make build-essential util-linux \
            qemu-user-static qemu-system-arm \
            git p7zip-full python3 python3-yaml python3-git \
            curl unzip wget jq

      - name: Cache base Raspberry Pi OS image
        id: cache-base-image
        uses: actions/cache@v4
        with:
          path: base-image-cache
          key: raspios-lite-arm64-bookworm-v1

      - name: Download base Raspberry Pi OS image
        if: steps.cache-base-image.outputs.cache-hit != 'true'
        run: |
          mkdir -p base-image-cache
          wget -q \
            https://downloads.raspberrypi.org/raspios_lite_arm64_latest \
            -O base-image-cache/raspios_lite_arm64_latest.img.xz
          echo "Downloaded: $(ls -lh base-image-cache/)"

      # CustomPiOS `base` module sources `modules/base/config`, which overwrites BASE_ZIP_IMG when unset.
      # `sudo VAR=… cmd` does not reliably pass VAR into nested config on all runners; keep a copy under
      # `src/image/` (same as `make download-image`) and use `sudo -E` so BASE_ZIP_IMG survives.
      - name: Stage base image into distro image dir
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/RAVENOS-PI5/src/image"
          SRC="${GITHUB_WORKSPACE}/base-image-cache/raspios_lite_arm64_latest.img.xz"
          DST="${GITHUB_WORKSPACE}/RAVENOS-PI5/src/image/raspios_lite_arm64_latest.img.xz"
          test -f "${SRC}"
          cp -f "${SRC}" "${DST}"
          ls -lh "${DST}"

      - name: Build image
        run: |
          sudo modprobe loop
          export DIST_PATH="${GITHUB_WORKSPACE}/RAVENOS-PI5/src"
          export CUSTOM_PI_OS_PATH="${GITHUB_WORKSPACE}/CustomPiOS/src"
          export BASE_ZIP_IMG="${GITHUB_WORKSPACE}/base-image-cache/raspios_lite_arm64_latest.img.xz"
          sudo -E bash "${GITHUB_WORKSPACE}/CustomPiOS/src/build"

      # CustomPiOS already unmounts on success; on failure the ERR trap runs unmount_image force.
      # If anything still holds $BASE_MOUNT_PATH (qemu/apt/dpkg), plain umount can fail. Lazy
      # recursive unmount + loop detach keeps the runner clean and avoids "device is busy" noise.
      - name: Release image mounts and loop devices
        if: always()
        run: |
          M="${GITHUB_WORKSPACE}/RAVENOS-PI5/src/workspace/mount"
          sync
          if sudo mount 2>/dev/null | grep -qF "${M}"; then
            echo "Lazy-unmounting ${M} ..."
            sudo umount -R -l "${M}" 2>/dev/null || true
          fi
          sudo losetup -D 2>/dev/null || true

      - name: Upload build diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          if-no-files-found: warn
          path: |
            build.log
          retention-days: 7

      - name: Find, shrink, and rename output image
        id: rename
        env:
          SKIP_PISHRINK: ${{ inputs.skip_pishrink }}
        run: |
          WORKSPACE=RAVENOS-PI5/src/workspace
          VERSION="${{ github.ref_name }}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "main" ]; then
            VERSION=$(date +'%Y%m%d')
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          IMG=$(find "${WORKSPACE}" -maxdepth 1 \( -name "*.img" -o -name "*.img.xz" \) | head -n1)
          if [ -z "${IMG}" ]; then
            echo "No image found in ${WORKSPACE}" && ls -la "${WORKSPACE}" && exit 1
          fi
          EXT="${IMG##*.img}"
          DEST="${WORKSPACE}/RavenOS-PI5-${VERSION}-arm64.img${EXT}"
          sudo mv "${IMG}" "${DEST}"
          sudo chown $USER:$USER "${DEST}" || true
          
          # If the resulting file is a raw .img, strip empty blocks and compress it!
          if [[ "${DEST}" == *.img ]]; then
            echo "Disk before PiShrink / xz:"
            df -h
            if [ "${SKIP_PISHRINK:-false}" = "true" ]; then
              echo "SKIP_PISHRINK=true — skipping PiShrink (workflow_dispatch). Artifact will be much larger."
            else
              echo "Downloading PiShrink..."
              sudo wget -q https://raw.githubusercontent.com/Drewsif/PiShrink/master/pishrink.sh -O /usr/local/bin/pishrink.sh
              sudo chmod +x /usr/local/bin/pishrink.sh
              # -s skip first-boot auto-expand hook; -n skip GitHub version check (curl in CI)
              echo "Shrinking filesystem (PiShrink)..."
              if ! sudo pishrink.sh -s -n "${DEST}"; then
                echo "PiShrink failed; retrying with filesystem repair (-r)..."
                sudo pishrink.sh -s -n -r "${DEST}"
              fi
              echo "Disk after PiShrink:"
              df -h
            fi
            # PiShrink runs as root; workspace dir often stays root-owned — runner cannot create *.xz here.
            sudo chown "$USER:$USER" "${DEST}" "${WORKSPACE}" 2>/dev/null || true
            echo "Compressing heavily with xz..."
            # -T0 uses all available CPU threads for max speed; sudo so output is writable under root-owned paths
            sudo xz -T0 -z -9 "${DEST}"
            sudo chown "$USER:$USER" "${DEST}.xz"
            DEST="${DEST}.xz"
          fi

          echo "IMAGE_PATH=${DEST}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_NAME=$(basename ${DEST})" >> "$GITHUB_OUTPUT"
          ls -lh "${DEST}"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: RavenOS-PI5-${{ steps.rename.outputs.VERSION }}-arm64
          path: ${{ steps.rename.outputs.IMAGE_PATH }}
          retention-days: 30

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          NOTES=$(awk "/^## ${TAG}/,/^## /" RAVENOS-PI5/CHANGELOG.md \
                  | grep -v "^## ${TAG}" | grep -v "^## " | sed '/^$/d')
          if [ -z "${NOTES}" ]; then
            NOTES="See CHANGELOG.md for full details."
          fi
          echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "${NOTES}"   >> "$GITHUB_OUTPUT"
          echo "EOF"        >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.IMAGE_PATH }}
          name: "RavenOS PI5 ${{ github.ref_name }}"
          body: |
            ## RavenOS PI5 ${{ github.ref_name }}

            Raspberry Pi OS image with the **RatOS v2.1.x–class** stack — not the upstream RatOS CB1 image. See README.

            ${{ steps.changelog.outputs.NOTES }}

            ### Targets
            - Raspberry Pi 5 (Bookworm 64-bit arm64)
            - Raspberry Pi 4 (Bookworm 64-bit arm64)

            ### Flash Instructions
            1. Download the `.img.xz` file
            2. Open **Raspberry Pi Imager** → Choose OS → Use Custom
            3. Select the file, choose your SD card / NVMe, and write
            4. Boot your Pi, then browse to `http://ravenos.local` (hostname may include a serial suffix after first boot)

            ### Default Credentials
            | Service | URL | User | Password |
            |---|---|---|---|
            | SSH | `ssh pi@ravenos.local` | `pi` | `raspberry` |
            | Mainsail | `http://ravenos.local` | — | — |
            | RavenOS Configurator | `http://ravenos.local/configure` | — | — |

            > ⚠️ Change the default password after first login: `passwd pi`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

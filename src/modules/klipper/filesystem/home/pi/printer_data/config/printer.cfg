# ============================================================
# R3DTOS PI5 — Default printer.cfg (Klipper + klipper-mcu bring-up)
# ============================================================
# Matches RatOS v2.1.x `printers/initial-setup.cfg` intent: host Linux MCU at
# /tmp/klipper_host_mcu (see klipper-mcu.service) and kinematics:none until the
# Configurator writes a real printer layout. We cannot [include RatOS/...] here
# because the RatOS-configuration module runs after this file is installed.
# ============================================================

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[display_status]

[pause_resume]

[respond]

[temperature_sensor raspberry_pi]
sensor_type: temperature_host

[mcu]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: none
max_velocity: 1
max_accel: 1

[idle_timeout]
timeout: 7200
gcode:
  M84

# moonraker-timelapse (installed later in the image build; present on flashed SD)
[include timelapse.cfg]
